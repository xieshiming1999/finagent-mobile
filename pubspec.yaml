name: finagent
description: "Flutter mobile finance agent app with local-first runtime"
publish_to: 'none'
version: 1.0.0+1

hooks:
  user_defines:
    sqlite3:
      source: system

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  meta: ^1.18.0
  path_provider: ^2.1.5
  glob: ^2.1.0
  path: ^1.9.0
  sqlite3: ^3.3.0
  sqlite3_flutter_libs: ^0.5.0
  flutter_markdown: ^0.7.7+1
  flutter_widget_from_html_core: ^0.15.2
  flutter_js: ^0.8.7
  crypto: ^3.0.6
  file_picker: ^10.3.10
  shared_preferences: ^2.5.5
  syncfusion_flutter_pdf: ^33.1.49
  pdfrx: ^2.2.24
  image: ^4.5.3
  webview_flutter: ^4.13.1
  k_chart: ^0.7.1
  fast_gbk: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  webview_flutter_platform_interface: ^2.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/finance/AGENTS.md
    - assets/finance/chat/
    - assets/finance/event/
    - assets/finance/tdx_servers.json
    - assets/finance/skills/stock/
    - assets/finance/skills/fund/
    - assets/finance/skills/data-sources/
    - assets/finance/skills/data-sources/references/
    - assets/finance/skills/tushare/
    - assets/finance/skills/wind-aifinmarket/
    - assets/finance/skills/wind-find-finance-skill/
    - assets/finance/skills/tradingview-scanner/
    - assets/finance/skills/oil-war-room/
    - assets/finance/skills/market-overview/
    - assets/finance/skills/monitor-dashboard/
    - assets/finance/skills/monitor-templates/
    - assets/finance/skills/stock-earnings-review/
    - assets/finance/skills/risk-debate/
    - assets/finance/skills/xueqiu-trade/
    - assets/finance/skills/post-trade/
