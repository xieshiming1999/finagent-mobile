<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oil War Room</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #131722;
    color: #d1d4dc;
  }
  .header {
    text-align: center;
    padding: 12px 0 8px;
    font-size: 16px;
    font-weight: 600;
    color: #e0e3eb;
    letter-spacing: 1px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 4px;
    padding: 4px;
    height: calc(100vh - 44px);
  }
  .panel {
    background: #1e222d;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .panel-label {
    position: absolute;
    top: 4px;
    left: 8px;
    font-size: 11px;
    color: #787b86;
    z-index: 10;
    pointer-events: none;
  }
  .panel iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>
<div class="header">Oil War Room</div>
<div class="grid">
  <div class="panel">
    <div class="panel-label">Brent Crude</div>
