<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
:root {
  --bg: #131722; --bg-card: #1e222d; --bg-hover: #2a2e39; --border: #2a2e39;
  --text: #d1d4dc; --text-dim: #787b86; --text-bright: #f0f3fa;
  --accent: #2962ff; --green: #26a69a; --red: #ef5350; --yellow: #ffc107;
  --radius: 6px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }
.container { padding: 12px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
.card-header { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.flex { display: flex; gap: 8px; align-items: center; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.status-ok { background: var(--green); }
.status-warn { background: var(--yellow); }
.status-error { background: var(--red); }
.status-idle { background: var(--text-dim); }
.text-dim { color: var(--text-dim); }
.text-sm { font-size: 11px; }
.text-xl { font-size: 20px; font-weight: 700; }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-yellow { color: var(--yellow); }
.loading-text { color: var(--text-dim); font-size: 12px; text-align: center; padding: 40px; }
#status-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
#log { max-height: 200px; overflow-y: auto; padding: 8px 12px; font-family: monospace; font-size: 11px; }
#log .entry { padding: 2px 0; border-bottom: 1px solid rgba(42,46,57,0.3); }
#log .time { color: var(--text-dim); margin-right: 8px; }
</style>
</head>
<body>
<div id="status-bar">
  <span class="status-dot status-idle" id="status-dot"></span>
  <span id="status-text">Initializing...</span>
  <span style="flex:1"></span>
  <span id="last-check">—</span>
</div>
<div class="container">
  <div id="monitors"></div>
  <div class="card" style="margin-top: 10px;">
    <div class="card-header">Activity Log</div>
    <div id="log"></div>
  </div>
</div>

<script>
var Bridge=(function(){var _id=0,_cb={};window.__bridgeCallback__=function(id,data){if(_cb[id]){_cb[id](data);delete _cb[id]}};function _send(msg){return new Promise(function(resolve){var id=String(++_id);msg.id=id;_cb[id]=resolve;if(window.AgentBridge){AgentBridge.postMessage(JSON.stringify(msg))}else{resolve({error:'AgentBridge not available'})}})}return{fetch:function(p,params,m){return _send({type:'http',method:m||'GET',path:p,params:params||{}})},post:function(p,body){return _send({type:'http',method:'POST',path:p,params:body||{}})},sendToAgent:function(msg,data){return _send({type:'agent_message',message:msg,source:document.title||'dashboard',data:data||{}})},notify:function(msg){return _send({type:'notify',message:msg})},alert:function(msg){return _send({type:'notify',message:'⚠ '+msg})},onPush:function(ch,fn){if(!window.__pushHandlers__)window.__pushHandlers__={};window.__pushHandlers__[ch]=fn}}})();
window.__onPush__=function(ch,data){if(window.__pushHandlers__&&window.__pushHandlers__[ch])window.__pushHandlers__[ch](data)};
</script>

<script>
/**
 * Monitor Dashboard Template
 *
 * Agent should customize:
 * 1. Replace {{TITLE}}
 * 2. Set CONFIG.monitors[] with {id, label, apiPath, apiParams, extract(resp), threshold(value)}
 * 3. Set CONFIG.interval (ms, default 30000)
 */

var CONFIG = {
  interval: 30000,
  monitors: [
    // Example:
    // {
    //   id: 'brent',
    //   label: 'Brent Crude',
    //   unit: 'USD/bbl',
    //   apiPath: '/api/finance/tushare',
    //   apiParams: { api_name: 'fx_daily', params: { ts_code: 'BRENT.IPE', limit: 1 } },
    //   extract: function(resp) { return resp.data && resp.data[0] ? resp.data[0].close : null; },
    //   threshold: function(val) {
    //     if (val > 80) return { status: 'error', message: 'Brent above $80!' };
    //     if (val > 75) return { status: 'warn', message: 'Brent approaching $80' };
    //     return { status: 'ok' };
    //   }
    // }
  ]
};

var _timer = null;
var _values = {};

function logEntry(text, level) {
  var log = document.getElementById('log');
  var div = document.createElement('div');
  div.className = 'entry';
  var now = new Date().toLocaleTimeString();
  var color = level === 'error' ? 'var(--red)' : level === 'warn' ? 'var(--yellow)' : 'var(--text)';
  div.innerHTML = '<span class="time">' + now + '</span><span style="color:' + color + '">' + text + '</span>';
  log.insertBefore(div, log.firstChild);
  while (log.children.length > 50) log.removeChild(log.lastChild);
}

function renderMonitors() {
  var container = document.getElementById('monitors');
  container.innerHTML = CONFIG.monitors.map(function(m) {
    return '<div class="card" id="monitor-' + m.id + '">' +
      '<div class="card-header"><span>' + m.label + '</span><span class="status-dot status-idle" id="dot-' + m.id + '"></span></div>' +
      '<div class="text-xl" id="val-' + m.id + '">—</div>' +
      '<div class="text-sm text-dim" id="unit-' + m.id + '">' + (m.unit || '') + '</div>' +
      '</div>';
  }).join('');
}

function checkMonitor(m) {
  return Bridge.fetch(m.apiPath, m.apiParams || {}).then(function(resp) {
    if (resp.error) {
      logEntry(m.label + ': fetch error — ' + resp.error, 'error');
      return;
    }
    var val = m.extract ? m.extract(resp) : null;
    if (val == null) { logEntry(m.label + ': no data', 'warn'); return; }

    var prev = _values[m.id];
    _values[m.id] = val;

    var valEl = document.getElementById('val-' + m.id);
    var dotEl = document.getElementById('dot-' + m.id);
    if (valEl) valEl.textContent = typeof val === 'number' ? val.toLocaleString(undefined, {maximumFractionDigits: 4}) : val;

    var check = m.threshold ? m.threshold(val, prev) : { status: 'ok' };
    if (dotEl) {
      dotEl.className = 'status-dot status-' + check.status;
    }

    if (check.status === 'error' || check.status === 'warn') {
      var msg = check.message || (m.label + ' threshold breached: ' + val);
      logEntry(msg, check.status);
      Bridge.sendToAgent(msg, { monitor: m.id, value: val, status: check.status });
    } else {
      logEntry(m.label + ': ' + val, 'info');
    }
  });
}

function runChecks() {
  document.getElementById('status-text').textContent = 'Checking...';
  var dot = document.getElementById('status-dot');
  dot.className = 'status-dot status-ok';

  Promise.all(CONFIG.monitors.map(checkMonitor)).then(function() {
    document.getElementById('status-text').textContent = 'Running';
    document.getElementById('last-check').textContent = 'Last: ' + new Date().toLocaleTimeString();
  });
}

function start() {
  renderMonitors();
  if (CONFIG.monitors.length === 0) {
    document.getElementById('status-text').textContent = 'No monitors configured';
    return;
  }
  runChecks();
  _timer = setInterval(runChecks, CONFIG.interval);
  logEntry('Monitor started, interval: ' + (CONFIG.interval / 1000) + 's', 'info');
}

function stop() {
  if (_timer) { clearInterval(_timer); _timer = null; }
  document.getElementById('status-text').textContent = 'Stopped';
  document.getElementById('status-dot').className = 'status-dot status-idle';
  logEntry('Monitor stopped', 'info');
}

Bridge.onPush('monitor', function(data) {
  if (data.action === 'stop') stop();
  else if (data.action === 'start') start();
  else if (data.action === 'check') runChecks();
});

start();
</script>
</body>
</html>
