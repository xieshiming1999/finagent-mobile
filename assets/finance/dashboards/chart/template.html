<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
/* === Inline common/style.css === */
:root {
  --bg: #131722; --bg-card: #1e222d; --bg-hover: #2a2e39; --border: #2a2e39;
  --text: #d1d4dc; --text-dim: #787b86; --text-bright: #f0f3fa;
  --accent: #2962ff; --green: #26a69a; --red: #ef5350; --yellow: #ffc107;
  --radius: 6px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }
.container { padding: 12px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.card-header { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.text-dim { color: var(--text-dim); }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.loading-text { color: var(--text-dim); font-size: 12px; text-align: center; padding: 40px; }
#chart { width: 100%; height: calc(100vh - 60px); min-height: 300px; }
.toolbar { display: flex; gap: 6px; align-items: center; padding: 8px 12px; flex-wrap: wrap; }
.toolbar .btn {
  padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg-card); color: var(--text-dim); font-size: 11px; cursor: pointer;
}
.toolbar .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.toolbar .btn:hover { color: var(--text-bright); }
</style>
</head>
<body>
<div class="toolbar" id="toolbar">
  <!-- Agent fills toolbar buttons here -->
</div>
<div id="chart">
  <div class="loading-text">Loading chart...</div>
</div>

<!-- ECharts CDN -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<script>
/* === Inline common/bridge.js === */
var Bridge=(function(){var _id=0,_cb={};window.__bridgeCallback__=function(id,data){if(_cb[id]){_cb[id](data);delete _cb[id]}};function _send(msg){return new Promise(function(resolve){var id=String(++_id);msg.id=id;_cb[id]=resolve;if(window.AgentBridge){AgentBridge.postMessage(JSON.stringify(msg))}else{resolve({error:'AgentBridge not available'})}})}return{fetch:function(p,params,m){return _send({type:'http',method:m||'GET',path:p,params:params||{}})},post:function(p,body){return _send({type:'http',method:'POST',path:p,params:body||{}})},sendToAgent:function(msg,data){return _send({type:'agent_message',message:msg,source:document.title||'dashboard',data:data||{}})},notify:function(msg){return _send({type:'notify',message:msg})},alert:function(msg){return _send({type:'notify',message:'⚠ '+msg})},onPush:function(ch,fn){if(!window.__pushHandlers__)window.__pushHandlers__={};window.__pushHandlers__[ch]=fn}}})();
window.__onPush__=function(ch,data){if(window.__pushHandlers__&&window.__pushHandlers__[ch])window.__pushHandlers__[ch](data)};
</script>

<script>
/**
 * Chart Dashboard Template
 *
 * Agent should customize:
 * 1. Replace {{TITLE}} with dashboard title
 * 2. Fill CONFIG object with chart options
 * 3. Fill fetchData() with API calls via Bridge.fetch()
 */

var chart = null;

var CONFIG = {
  // Agent fills: type, title, xAxis, series, etc.
  // Example:
  // type: 'candlestick',  // or 'line', 'bar', 'scatter'
  // apiPath: '/api/finance/tushare',
  // apiParams: { api_name: 'daily', params: { ts_code: '601398.SH', limit: 60 } },
  // --- OR set fullOption to pass raw ECharts option ---
  // fullOption: { ... }
};

function initChart() {
  var dom = document.getElementById('chart');
  dom.innerHTML = '';
  chart = echarts.init(dom, 'dark');
  chart.showLoading({ color: '#2962ff', maskColor: 'rgba(19,23,34,0.8)' });
  window.addEventListener('resize', function() { chart && chart.resize(); });
}

function renderChart(option) {
  if (!chart) return;
  chart.hideLoading();
  chart.setOption(option, true);
}

function fetchData() {
  if (CONFIG.fullOption) {
    renderChart(CONFIG.fullOption);
    return;
  }
  if (!CONFIG.apiPath) {
    chart && chart.hideLoading();
    document.getElementById('chart').innerHTML = '<div class="loading-text">No data configured. Set CONFIG.apiPath or CONFIG.fullOption.</div>';
    return;
  }
  Bridge.fetch(CONFIG.apiPath, CONFIG.apiParams || {}).then(function(data) {
    if (data.error) {
      Bridge.alert('Chart data fetch failed: ' + data.error);
      return;
    }
    // Agent should override buildOption() for custom chart types
    var option = typeof buildOption === 'function' ? buildOption(data) : defaultOption(data);
    renderChart(option);
  });
}

function defaultOption(data) {
  return {
    backgroundColor: '#131722',
    tooltip: { trigger: 'axis' },
    xAxis: { type: 'category', data: data.dates || [] },
    yAxis: { type: 'value' },
    series: [{ type: 'line', data: data.values || [], smooth: true, lineStyle: { color: '#2962ff' }, areaStyle: { color: 'rgba(41,98,255,0.1)' } }],
    grid: { left: 50, right: 20, top: 20, bottom: 30 }
  };
}

// Push data support: Bridge.onPush('chart', newData) refreshes chart
Bridge.onPush('chart', function(data) {
  if (data.option) renderChart(data.option);
  else fetchData();
});

// Init
if (typeof echarts !== 'undefined') {
  initChart();
  fetchData();
} else {
  document.getElementById('chart').innerHTML = '<div class="loading-text">ECharts CDN loading failed. Check network.</div>';
}
</script>
</body>
</html>
